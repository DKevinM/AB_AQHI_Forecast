name: Train Alberta Cubist Models

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  train-cubist:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4
    
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
    
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
    
      - name: Install Python Packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy
    
      - name: Install R Packages
        run: |
          Rscript -e 'install.packages(c("data.table","Cubist","R.utils"), repos="https://cloud.r-project.org")'
    
      - name: Build Alberta Master
        run: |
          python scripts/build_AB_master.py
    
      - name: Build Training Dataset
        run: |
          python scripts/build_training_dataset_ab.py
    
      - name: Train Cubist Models
        run: |
          Rscript scripts/train_cubist_ab.R
    
      - name: Show Models
        run: |
          ls -lh models/
    
      - name: Package Models
        run: |
          mkdir deliverable
    
          cp models/*_cubist.rds deliverable/
          cp models/*_cubist_metrics.txt deliverable/
          cp models/cubist_model_summary.csv deliverable/
    
          zip -r alberta_cubist_models.zip deliverable/
    
      - name: Upload Cubist Models
        uses: actions/upload-artifact@v4
        with:
          name: alberta-cubist-models
          path: alberta_cubist_models.zip
