name: Train Alberta RF Models

on:

  workflow_dispatch:

  push:
    paths:
      - "data/*.csv"
      - "scripts/build_AB_master.py"
      - "scripts/build_training_dataset_ab.py"
      - "scripts/train_rf_model.py"

permissions:
  contents: read

jobs:

  train-rf:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn joblib

      - name: Build Alberta Master
        run: |
          python scripts/build_AB_master.py

      - name: Build Training Dataset
        run: |
          python scripts/build_training_dataset_ab.py

      - name: Train RF Models
        run: |
          python scripts/train_rf_model.py

      - name: Show Model Files
        run: |
          ls -lh models/
          
      - name: Create RF Package
        run: |
          mkdir deliverable

          cp models/*_model.pkl deliverable/
          cp models/*metrics.txt deliverable/
          cp models/model_summary.csv deliverable/

          zip -r alberta_rf_models.zip deliverable/

      - name: Upload RF Models
        uses: actions/upload-artifact@v4
        with:
          name: alberta-rf-models
          path: alberta_rf_models.zip
