name: Build AB Master Dataset

on:
  workflow_dispatch:
  push:
    paths:
      - "data/*_c.csv"
      - "scripts/build_AB_master.py"
      - ".github/workflows/build_ab_master.yml"

permissions:
  contents: write

jobs:
  build-ab-master:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Check input files
        run: |
          ls -lh data
          head -5 data/O3_c.csv || true
          head -5 data/PM25_c.csv || true

      - name: Build Alberta master dataset
        run: |
          python scripts/build_AB_master.py

      - name: Show outputs
        run: |
          ls -lh data
          du -h data/AB_master.csv.gz || true

      - name: Commit output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/AB_master.csv.gz
          git add scripts/build_AB_master.py
          git commit -m "Build Alberta master dataset" || echo "No changes to commit"
          git push
