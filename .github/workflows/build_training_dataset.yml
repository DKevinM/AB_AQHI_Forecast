name: Build Alberta Training Dataset

on:

  workflow_dispatch:

  push:
    paths:
      - "data/*.csv"
      - "scripts/build_AB_master.py"
      - "scripts/build_training_dataset_ab.py"

permissions:
  contents: write

jobs:

  build-training:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Packages
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy

      - name: Build Alberta Master
        run: |
          python scripts/build_AB_master.py

      - name: Build Training Dataset
        run: |
          python scripts/build_training_dataset_ab.py


      - name: Verify Files
        run: |
          echo "TMP DIRECTORY"
          ls -lh /tmp

          echo ""
          echo "DATA DIRECTORY"
          ls -lh data


      - name: Show Outputs
        run: |
          ls -lh data
          du -h data/AB_master.csv.gz || true
          du -h /tmp/training_dataset.csv.gz || true



      - name: Dataset Diagnostics
        run: |
          python - <<EOF

          import pandas as pd

          df = pd.read_csv(
              "/tmp/training_dataset.csv.gz"
          )

          print("\n========================")
          print("TRAINING DATASET SUMMARY")
          print("========================")

          print("Rows:", len(df))
          print("Stations:", df["station"].nunique())

          print("\nDate Range:")
          print(df["datetime"].min())
          print(df["datetime"].max())

          print("\nAQHI Summary:")
          print(df["AQHI"].describe())

          print("\nFeature Missing Counts:")
          print(
              df[[
                  "PM25",
                  "NO2",
                  "O3",
                  "TEMP",
                  "RH",
                  "WS",
                  "WD"
              ]].isna().sum()
          )

          print("\nTop Stations:")
          print(
              df.groupby("station")
                .size()
                .sort_values(ascending=False)
                .head(20)
          )

          print("\nAQHI Distribution:")
          print(
              df["AQHI"]
              .round()
              .value_counts()
              .sort_index()
          )

          print("\nFill Flags Summary:")
          fill_cols = [
              c for c in df.columns
              if c.endswith("_filled")
          ]

          if len(fill_cols) > 0:
              print(
                  df[fill_cols]
                  .sum()
                  .sort_values(ascending=False)
              )

          print("\n========================")
          print("END DIAGNOSTICS")
          print("========================\n")

          EOF

        
